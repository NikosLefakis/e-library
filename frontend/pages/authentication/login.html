
<head>
    <link rel="stylesheet" href="cssStyles/user.css">
            <script
            src="https://code.jquery.com/jquery-3.1.0.js"></script>
</head>

<form id="form">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username">
    <br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password">
    <br><br>
    <input type="submit">Login</input>
    <p>Don't have an account? <button onclick="registerPageLoad()" id="signup-link">Sign Up</button></p>
    <p>Continue as guest: <button onclick="guestLogin()">here</button></p>
</form>

<script>
    if(document.cookie)
    {
        $("#load").load("pages/dashboard/dashboard.html");
    }
    $("#form").submit(function(e) {
      e.preventDefault();
      var formData = $(this).serializeArray();

      var jsonData = {};

      $.each(formData, function () {
        jsonData[this.name] = this.value;
      });
      var response = login(JSON.stringify(jsonData));
      console.log(response);
    });
</script>
