<style>
.auth-card { max-width: 420px; width: 100%; }
.auth-logo { text-align: center; margin-bottom: 20px; }
.auth-logo .logo-icon-lg {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, #0f2238, #1e40af);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; margin: 0 auto 10px;
  box-shadow: 0 8px 20px rgba(15,34,56,0.25);
}
.auth-logo h1 { font-size: 22px; font-weight: 800; margin: 0; color: var(--text); }
.auth-logo p { font-size: 13px; color: var(--text-muted); margin: 3px 0 0; }
</style>

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon-lg"><i class="fas fa-book-open"></i></div>
    <h1>E-Library</h1>
    <p>Your digital library portal</p>
  </div>

  <!-- Tabs -->
  <div style="display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;gap:4px">
    <button type="button" id="tab-user" onclick="switchTab('user')"
      style="flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:white;color:var(--text);box-shadow:var(--shadow-sm);font-family:inherit;transition:all .2s">
      <i class="fas fa-user" style="margin-right:5px"></i>User Login
    </button>
    <button type="button" id="tab-admin" onclick="switchTab('admin')"
      style="flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:inherit;transition:all .2s">
      <i class="fas fa-shield-halved" style="margin-right:5px"></i>Admin Portal
    </button>
  </div>

  <!-- User login -->
  <div id="panel-user">
    <form id="login-form-user">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label" style="font-size:12px">Username</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user icon"></i>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" style="font-size:12px">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock icon"></i>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="padding:12px;font-size:14px;font-weight:700">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:14px 0">
      <hr style="flex:1;border:none;border-top:1px solid var(--border)">
      <span style="font-size:11px;color:var(--text-muted)">OR</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--border)">
    </div>

    <button type="button" class="btn btn-outline btn-block" onclick="guestLogin()" style="padding:10px;font-size:13px;margin-bottom:14px">
      <i class="fas fa-user-clock"></i> Continue as Guest
    </button>

    <div style="display:flex;justify-content:space-between;align-items:center">
      <p style="font-size:12px;color:var(--text-muted);margin:0">
        Don't have an account?
        <button type="button" onclick="registerPageLoad()"
          style="background:none;border:none;color:var(--primary-light);font-weight:600;cursor:pointer;font-size:12px;font-family:inherit;padding:0">
          Sign Up
        </button>
      </p>
      <button type="button" onclick="$('#load').load('pages/authentication/forgot.html')"
        style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit;text-decoration:underline;padding:0">
        Forgot password?
      </button>
    </div>
  </div>

  <!-- Admin login -->
  <div id="panel-admin" style="display:none">
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#1e40af;display:flex;align-items:flex-start;gap:8px">
      <i class="fas fa-shield-halved" style="margin-top:2px;flex-shrink:0"></i>
      <span><strong>Admin / Librarian Portal</strong> — Sign in with administrator or librarian credentials.</span>
    </div>
    <form id="login-form-admin">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label" style="font-size:12px">Username</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user-shield icon"></i>
          <input type="text" name="username" class="form-control" placeholder="Admin username" required autocomplete="username">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" style="font-size:12px">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock icon"></i>
          <input type="password" name="password" class="form-control" placeholder="Admin password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-block" style="background:#0f2238;color:white;padding:12px;font-size:14px;font-weight:700;border-radius:10px;border:none;cursor:pointer;font-family:inherit">
        <i class="fas fa-shield-halved"></i> Enter Admin Portal
      </button>
    </form>
  </div>
</div>

<script>
  function switchTab(tab) {
    const isAdmin = tab === 'admin';
    $('#panel-user').toggle(!isAdmin);
    $('#panel-admin').toggle(isAdmin);
    $('#tab-user').css({ background: isAdmin ? 'none' : 'white', color: isAdmin ? 'var(--text-muted)' : 'var(--text)', boxShadow: isAdmin ? 'none' : 'var(--shadow-sm)' });
    $('#tab-admin').css({ background: isAdmin ? 'white' : 'none', color: isAdmin ? 'var(--text)' : 'var(--text-muted)', boxShadow: isAdmin ? 'var(--shadow-sm)' : 'none' });
  }

  function doLogin(form) {
    const btn = form.find('[type=submit]');
    const orig = btn.html();
    btn.html('<i class="fas fa-spinner fa-spin"></i> Signing in…').prop('disabled', true);
    const data = {};
    form.serializeArray().forEach(f => { data[f.name] = f.value; });
    login(JSON.stringify(data))
      .then(res => {
        if (res && res.success) {
          toast('Welcome back!', 'success');
          showApp();
          navigate('books');
        } else {
          toast('Wrong username or password', 'error');
          btn.html(orig).prop('disabled', false);
        }
      })
      .catch(() => {
        toast('Cannot reach server — is it running?', 'error');
        btn.html(orig).prop('disabled', false);
      });
  }

  $('#login-form-user').submit(function(e)  { e.preventDefault(); doLogin($(this)); });
  $('#login-form-admin').submit(function(e) { e.preventDefault(); doLogin($(this)); });
</script>
