<div class="flex-between mb-6">
  <div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:4px">📖 My Borrowings</h2>
    <p class="text-muted">Books you have borrowed or requested</p>
  </div>
</div>

<div id="notif-area"></div>
<div id="borrowed-wrap"><div class="spinner"></div></div>

<style>
.borrow-card {
  background: white;
  border-radius: 14px;
  border: 1px solid var(--border);
  display: flex;
  gap: 16px;
  padding: 16px;
  margin-bottom: 12px;
  transition: box-shadow .2s, transform .2s;
  align-items: flex-start;
}
.borrow-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.09); transform: translateY(-1px); }
.borrow-cover {
  width: 72px; min-width: 72px; height: 100px;
  border-radius: 8px; overflow: hidden;
  background: linear-gradient(135deg, #0d1f35, #1e40af);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: rgba(255,255,255,0.4); position: relative;
}
.borrow-cover img { width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0; }
.borrow-body { flex: 1; min-width: 0; }
.borrow-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.borrow-author { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.borrow-meta { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.borrow-meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.borrow-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
</style>

<script>
(function() {
  function statusBadge(s) {
    const labels = { requested:'Requested', borrowed:'Active', returned:'Returned', successEnd:'Completed' };
    const map = { requested:'badge-amber', borrowed:'badge-blue', returned:'badge-green', successEnd:'badge-gray' };
    return '<span class="badge '+(map[s]||'badge-gray')+'">'+(labels[s]||s)+'</span>';
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('el-GR',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function daysLeft(toDate) {
    if (!toDate) return null;
    return Math.ceil((new Date(toDate)-new Date())/(1000*60*60*24));
  }

  window._handleReturn = function(id, btn) {
    confirmDialog({
      title: 'Return Book',
      message: 'Are you sure you want to mark this book as returned?',
      type: 'warning',
      okText: 'Yes, Return',
      onOk: function() {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
        returnBook(id).then(res => {
          if (res&&res.success) { toast('Book marked as returned!','success'); navigate('borrowed'); }
          else { toast(res.message||'Could not update','error'); btn.innerHTML='<i class="fas fa-undo"></i> Return Book'; btn.disabled=false; }
        }).catch(()=>{ toast('Server error','error'); btn.disabled=false; });
      }
    });
  };

  listBorrowedBooks().then(data => {
    const wrap  = document.getElementById('borrowed-wrap');
    const notif = document.getElementById('notif-area');
    if (!data||data.error||data.length===0) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-bookmark"></i></div>
        <h3>No borrowings yet</h3><p>Browse the collection and borrow your first book!</p>
        <button class="btn btn-primary" onclick="navigate('books')"><i class="fas fa-search"></i> Browse Books</button></div>`;
      return;
    }
    const expiring = data.filter(b=>b.status==='borrowed'&&b.toDate&&daysLeft(b.toDate)<=3&&daysLeft(b.toDate)>=0);
    if (expiring.length>0) {
      notif.innerHTML = expiring.map(b=>`
        <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;font-size:14px;color:#92400e">
          <i class="fas fa-exclamation-triangle" style="font-size:18px;color:#d97706"></i>
          <div><strong>${b.title}</strong> is due in <strong>${daysLeft(b.toDate)} day${daysLeft(b.toDate)!==1?'s':''}</strong> (${fmtDate(b.toDate)}). Please return it soon!</div>
        </div>`).join('');
    }

    wrap.innerHTML = data.map(b => {
      const days = daysLeft(b.toDate);
      const dueSoon = b.status==='borrowed'&&days!==null&&days<=3&&days>=0;
      const overdue = b.status==='borrowed'&&days!==null&&days<0;
      const extra = overdue ? 'border-color:#fca5a5;background:#fff5f5' : dueSoon ? 'border-color:#fde68a;background:#fffbeb' : '';
      return `
      <div class="borrow-card" style="${extra}">
        <div class="borrow-cover">
          <i class="fas fa-book"></i>
          ${b.photo ? `<img src="${b.photo}" alt="${b.title}" onerror="this.remove()">` : ''}
        </div>
        <div class="borrow-body">
          <div class="borrow-title">${b.title||'Untitled'}</div>
          <div class="borrow-author"><i class="fas fa-pen-nib" style="margin-right:4px;opacity:.5;font-size:10px"></i>${b.authors||'Unknown Author'}</div>
          <div class="borrow-meta">
            <div class="borrow-meta-item">${statusBadge(b.status)}${overdue?' <span style="color:#dc2626;font-size:11px;font-weight:700;margin-left:4px">OVERDUE</span>':''}</div>
            <div class="borrow-meta-item"><i class="fas fa-calendar-alt"></i> ${fmtDate(b.fromDate||b.createdAt)}</div>
            <div class="borrow-meta-item">
              <i class="fas fa-calendar-check" style="color:${overdue?'#dc2626':dueSoon?'#d97706':'inherit'}"></i>
              <span style="color:${overdue?'#dc2626':dueSoon?'#d97706':'inherit'}">Due ${fmtDate(b.toDate)}</span>
            </div>
            ${b.isbn ? `<div class="borrow-meta-item"><i class="fas fa-barcode"></i> ${b.isbn}</div>` : ''}
          </div>
          <div class="borrow-actions">
            ${b.status==='borrowed' ? `<button class="btn btn-outline btn-sm" onclick="_handleReturn(${b.id},this)"><i class="fas fa-undo"></i> Return Book</button>` : ''}
            ${b.status==='successEnd' ? `<button class="btn btn-ghost btn-sm" onclick="openReviews(${b.book_id},'${(b.title||'').replace(/'/g,"\\'")}')"><i class="fas fa-star"></i> Write Review</button>` : ''}
            ${b.status==='requested' ? `<span style="font-size:12px;color:var(--text-muted);background:var(--bg);padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px"><i class="fas fa-clock"></i> Awaiting librarian approval</span>` : ''}
            ${b.status==='returned' ? `<span style="font-size:12px;color:#059669;background:#ecfdf5;padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px"><i class="fas fa-check"></i> Awaiting return confirmation</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }).catch(()=>{
    document.getElementById('borrowed-wrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Could not load data</h3></div>';
  });

  window.openReviews = function(bookId, title) {
    openModal('Reviews — '+title,'<div class="spinner"></div>');
    const loggedIn = !!getCookie('user_id');
    getBookReviews(bookId).then(reviews => {
      const stars = n=>'★'.repeat(n||0)+'☆'.repeat(5-(n||0));
      const list = (reviews&&reviews.length)
        ? reviews.map(r=>`<div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <strong style="font-size:13px">${r.user?r.user.username:'User #'+r.user_id}</strong>
            ${r.reviewscore?`<span style="color:var(--accent);margin-left:8px">${stars(r.reviewscore)}</span>`:''}
            <p style="font-size:14px;color:var(--text-muted);margin:4px 0 0">${r.content}</p>
          </div>`).join('')
        : '<p style="text-align:center;color:var(--text-muted);padding:20px 0">No reviews yet.</p>';
      const form = loggedIn?`
        <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:20px">
          <h4 style="font-size:14px;font-weight:700;margin-bottom:12px">Write a Review</h4>
          <div style="display:flex;gap:8px;margin-bottom:12px" id="star-row">
            ${[1,2,3,4,5].map(n=>`<button type="button" onclick="setScore(${n})" data-star="${n}" style="background:none;border:none;font-size:22px;color:var(--border);cursor:pointer;padding:0">★</button>`).join('')}
          </div>
          <input type="hidden" id="review-score" value="">
          <textarea id="review-text" class="form-control" rows="3" placeholder="Share your thoughts…" style="margin-bottom:12px"></textarea>
          <button class="btn btn-primary btn-sm" onclick="submitReview(${bookId})"><i class="fas fa-paper-plane"></i> Submit</button>
        </div>`:'';
      $('#modal-body').html('<div>'+list+'</div>'+form);
    });
    window.setScore = function(n) {
      $('#review-score').val(n);
      $('#star-row button').each(function(){$(this).css('color',$(this).data('star')<=n?'var(--accent)':'var(--border)');});
    };
    window.submitReview = function(bId) {
      const content=$('#review-text').val().trim(), score=parseInt($('#review-score').val())||null;
      if(!content){toast('Write something first!','warning');return;}
      createBookReview(bId,content,score).then(res=>{
        if(res&&res.success){toast('Review submitted!','success');closeModal();}
        else toast(res.message||'Could not submit review','error');
      });
    };
  };
})();
</script>
