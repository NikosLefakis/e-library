<div class="flex-between mb-6">
  <div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:4px">📊 Statistics</h2>
    <p class="text-muted">Library system overview and analytics</p>
  </div>
</div>

<div id="stats-wrap">
  <div class="spinner"></div>
</div>

<script>
(function() {
  const role = getCookie('user_role');
  if (role !== 'administrator') {
    document.getElementById('stats-wrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon"><i class="fas fa-lock"></i></div><h3>Access Denied</h3><p>Administrator access required.</p></div>';
    return;
  }

  getStats().then(data => {
    if (data.error) {
      document.getElementById('stats-wrap').innerHTML =
        '<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Could not load stats</h3></div>';
      return;
    }

    document.getElementById('stats-wrap').innerHTML = `
      <!-- Summary cards -->
      <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px">
        <div class="card" style="text-align:center;padding:20px 16px">
          <div style="font-size:32px;font-weight:800;color:var(--primary)">${data.totalBooks || 0}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px"><i class="fas fa-book"></i> Total Books</div>
        </div>
        <div class="card" style="text-align:center;padding:20px 16px">
          <div style="font-size:32px;font-weight:800;color:var(--accent)">${data.totalUsers || 0}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px"><i class="fas fa-graduation-cap"></i> Students</div>
        </div>
        <div class="card" style="text-align:center;padding:20px 16px">
          <div style="font-size:32px;font-weight:800;color:#10b981">${data.totalLibraries || 0}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px"><i class="fas fa-building-columns"></i> Libraries</div>
        </div>
        <div class="card" style="text-align:center;padding:20px 16px">
          <div style="font-size:32px;font-weight:800;color:#6366f1">${data.totalBorrowings || 0}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px"><i class="fas fa-bookmark"></i> Total Borrowings</div>
        </div>
      </div>

      <!-- Charts row -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:20px">
        <div class="card">
          <div class="card-body">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:16px"><i class="fas fa-chart-pie" style="color:var(--accent);margin-right:8px"></i>Books by Genre</h3>
            <div id="chart-genre" style="height:260px"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:16px"><i class="fas fa-chart-bar" style="color:var(--primary-light);margin-right:8px"></i>Books per Library</h3>
            <div id="chart-libraries" style="height:260px"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:16px"><i class="fas fa-users" style="color:#10b981;margin-right:8px"></i>Students by Type</h3>
            <div id="chart-students" style="height:260px"></div>
          </div>
        </div>
      </div>`;

    // Draw Google Charts
    google.charts.load('current', { packages: ['corechart', 'bar'] });
    google.charts.setOnLoadCallback(() => {
      const COLORS = ['#0f2238','#f59e0b','#10b981','#6366f1','#ec4899','#14b8a6','#f97316'];

      // Pie chart: books by genre
      if (data.booksPerGenre && data.booksPerGenre.length > 0) {
        const genreData = google.visualization.arrayToDataTable([
          ['Genre', 'Books'],
          ...data.booksPerGenre.map(g => [g.genre, g.count])
        ]);
        new google.visualization.PieChart(document.getElementById('chart-genre')).draw(genreData, {
          legend: { position: 'bottom', textStyle: { fontSize: 11 } },
          colors: COLORS,
          chartArea: { width: '90%', height: '70%' },
          backgroundColor: 'transparent',
          tooltip: { showColorCode: true }
        });
      } else {
        document.getElementById('chart-genre').innerHTML = '<div class="empty-state" style="padding:30px 0"><p>No genre data yet.</p></div>';
      }

      // Bar chart: books per library
      if (data.booksPerLibrary && data.booksPerLibrary.length > 0) {
        const libData = google.visualization.arrayToDataTable([
          ['Library', 'Books', { role: 'style' }],
          ...data.booksPerLibrary.map((l, i) => [l.name, l.count, COLORS[i % COLORS.length]])
        ]);
        new google.visualization.BarChart(document.getElementById('chart-libraries')).draw(libData, {
          legend: { position: 'none' },
          chartArea: { width: '65%', height: '80%' },
          backgroundColor: 'transparent',
          hAxis: { minValue: 0, gridlines: { color: '#e5e7eb' }, textStyle: { fontSize: 11 } },
          vAxis: { textStyle: { fontSize: 11 } }
        });
      } else {
        document.getElementById('chart-libraries').innerHTML = '<div class="empty-state" style="padding:30px 0"><p>No library data yet. Add books to libraries!</p></div>';
      }

      // Pie chart: students by type
      if (data.studentsByType && data.studentsByType.length > 0) {
        const typeLabels = { undergraduate: 'Undergraduate', postgraduate: 'Postgraduate', phd: 'PhD', unspecified: 'Unspecified' };
        const stuData = google.visualization.arrayToDataTable([
          ['Type', 'Students'],
          ...data.studentsByType.map(s => [typeLabels[s.type] || s.type, s.count])
        ]);
        new google.visualization.PieChart(document.getElementById('chart-students')).draw(stuData, {
          legend: { position: 'bottom', textStyle: { fontSize: 11 } },
          colors: ['#0f2238','#f59e0b','#10b981','#e5e7eb'],
          chartArea: { width: '90%', height: '70%' },
          backgroundColor: 'transparent'
        });
      } else {
        document.getElementById('chart-students').innerHTML = '<div class="empty-state" style="padding:30px 0"><p>No student data yet.</p></div>';
      }
    });
  });
})();
</script>
