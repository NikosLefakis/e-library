<div class="flex-between mb-6">
  <div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:4px">📊 Statistics</h2>
    <p class="text-muted">Library system overview and analytics</p>
  </div>
  <button class="btn btn-outline btn-sm" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
</div>

<div id="stats-wrap"><div class="spinner"></div></div>

<script>
(function() {
  const role = getCookie('user_role');
  if (role !== 'administrator') {
    document.getElementById('stats-wrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon"><i class="fas fa-lock"></i></div><h3>Access Denied</h3><p>Administrator access required.</p></div>';
    return;
  }

  Promise.all([getStats(), getAllBorrowings()]).then(([data, borrowings]) => {
    if (data.error) {
      document.getElementById('stats-wrap').innerHTML =
        '<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Could not load stats</h3></div>';
      return;
    }

    const bArr = Array.isArray(borrowings) ? borrowings : [];
    const pending  = bArr.filter(b => b.status === 'requested').length;
    const active   = bArr.filter(b => b.status === 'borrowed').length;
    const returned = bArr.filter(b => b.status === 'returned').length;
    const done     = bArr.filter(b => b.status === 'successEnd').length;

    document.getElementById('stats-wrap').innerHTML = `
      <!-- KPI row -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
        <div class="card" style="padding:16px 14px;text-align:center;border-top:3px solid #0f2238">
          <div style="font-size:28px;font-weight:800;color:#0f2238">${data.totalBooks||0}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-book"></i> Total Books</div>
        </div>
        <div class="card" style="padding:16px 14px;text-align:center;border-top:3px solid var(--accent)">
          <div style="font-size:28px;font-weight:800;color:var(--accent)">${data.totalUsers||0}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-graduation-cap"></i> Students</div>
        </div>
        <div class="card" style="padding:16px 14px;text-align:center;border-top:3px solid #10b981">
          <div style="font-size:28px;font-weight:800;color:#10b981">${data.totalLibraries||0}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-building-columns"></i> Libraries</div>
        </div>
        <div class="card" style="padding:16px 14px;text-align:center;border-top:3px solid #6366f1">
          <div style="font-size:28px;font-weight:800;color:#6366f1">${data.totalBorrowings||0}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-bookmark"></i> Total Borrowings</div>
        </div>
      </div>

      <!-- Borrowing status row -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
        <div style="background:#fef3c7;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="background:#d97706;color:white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center"><i class="fas fa-clock"></i></div>
          <div><div style="font-size:20px;font-weight:800;color:#92400e">${pending}</div><div style="font-size:11px;color:#a16207">Pending</div></div>
        </div>
        <div style="background:#eff6ff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="background:#2563eb;color:white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center"><i class="fas fa-book-open"></i></div>
          <div><div style="font-size:20px;font-weight:800;color:#1d4ed8">${active}</div><div style="font-size:11px;color:#3b82f6">Active</div></div>
        </div>
        <div style="background:#f0fdf4;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="background:#10b981;color:white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center"><i class="fas fa-undo"></i></div>
          <div><div style="font-size:20px;font-weight:800;color:#059669">${returned}</div><div style="font-size:11px;color:#10b981">Returned</div></div>
        </div>
        <div style="background:#f5f3ff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="background:#7c3aed;color:white;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center"><i class="fas fa-check-double"></i></div>
          <div><div style="font-size:20px;font-weight:800;color:#6d28d9">${done}</div><div style="font-size:11px;color:#7c3aed">Completed</div></div>
        </div>
      </div>

      <!-- Charts row (3 charts side by side) -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
        <div class="card">
          <div class="card-body" style="padding:16px">
            <h3 style="font-size:13px;font-weight:700;margin-bottom:12px"><i class="fas fa-chart-pie" style="color:var(--accent);margin-right:6px"></i>Books by Genre</h3>
            <div id="chart-genre" style="height:200px"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body" style="padding:16px">
            <h3 style="font-size:13px;font-weight:700;margin-bottom:12px"><i class="fas fa-chart-bar" style="color:var(--primary-light);margin-right:6px"></i>Books per Library</h3>
            <div id="chart-libraries" style="height:200px"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body" style="padding:16px">
            <h3 style="font-size:13px;font-weight:700;margin-bottom:12px"><i class="fas fa-users" style="color:#10b981;margin-right:6px"></i>Students by Type</h3>
            <div id="chart-students" style="height:200px"></div>
          </div>
        </div>
      </div>`;

    google.charts.load('current', { packages: ['corechart', 'bar'] });
    google.charts.setOnLoadCallback(() => {
      const COLORS = ['#0f2238','#f59e0b','#10b981','#6366f1','#ec4899','#14b8a6','#f97316'];
      const chartOpts = { legend: { position: 'bottom', textStyle: { fontSize: 10 } }, chartArea: { width: '90%', height: '65%' }, backgroundColor: 'transparent', tooltip: { showColorCode: true } };

      if (data.booksPerGenre && data.booksPerGenre.length > 0) {
        new google.visualization.PieChart(document.getElementById('chart-genre')).draw(
          google.visualization.arrayToDataTable([['Genre','Books'],...data.booksPerGenre.map(g=>[g.genre,g.count])]),
          { ...chartOpts, colors: COLORS }
        );
      } else document.getElementById('chart-genre').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:12px">No data yet</p>';

      if (data.booksPerLibrary && data.booksPerLibrary.length > 0) {
        new google.visualization.BarChart(document.getElementById('chart-libraries')).draw(
          google.visualization.arrayToDataTable([['Library','Books',{role:'style'}],...data.booksPerLibrary.map((l,i)=>[l.name.split('—')[0].trim(),l.count,COLORS[i%COLORS.length]])]),
          { legend:{position:'none'}, chartArea:{width:'60%',height:'78%'}, backgroundColor:'transparent', hAxis:{minValue:0,textStyle:{fontSize:10}}, vAxis:{textStyle:{fontSize:10}} }
        );
      } else document.getElementById('chart-libraries').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:12px">No data yet</p>';

      if (data.studentsByType && data.studentsByType.length > 0) {
        const labels = { undergraduate:'Undergrad', postgraduate:'Postgrad', phd:'PhD', unspecified:'Other' };
        new google.visualization.PieChart(document.getElementById('chart-students')).draw(
          google.visualization.arrayToDataTable([['Type','Students'],...data.studentsByType.map(s=>[labels[s.type]||s.type,s.count])]),
          { ...chartOpts, colors:['#0f2238','#f59e0b','#10b981','#e5e7eb'] }
        );
      } else document.getElementById('chart-students').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:12px">No data yet</p>';
    });
  });
})();
</script>
